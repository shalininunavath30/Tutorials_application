version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: sampleproject
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - project-network

  frontend:
    build:
      context: ./frontend
    container_name: sample-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - project-network

networks:
  project-network:
    driver: bridge